<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 自媒体助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <h1>🚀 自媒体助手</h1>
                <span class="subtitle">AI 写作 · 多平台分发</span>
            </div>
            <div class="header-right">
                <div id="platformStatus" class="platform-status"></div>
            </div>
        </header>

        <!-- Tab 导航 -->
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="switchPage('hotspot')">🔥 热点资讯</button>
            <button class="tab-btn" onclick="switchPage('create')">✍️ 内容创作</button>
            <button class="tab-btn" onclick="switchPage('settings')">⚙️ 系统设置</button>
        </nav>

        <!-- ==================== 页面1：热点资讯 ==================== -->
        <main class="page active" id="page-hotspot">
            <div class="page-grid">
                <!-- 左侧：热搜榜 -->
                <section class="panel">
                    <div class="card">
                        <div class="card-header">
                            <h2>🔥 全网热搜榜</h2>
                            <div class="card-actions">
                                <select id="hotspotSource" class="select-sm" onchange="loadHotspots()">
                                    <option value="all">全部平台</option>
                                    <option value="weibo">微博</option>
                                    <option value="baidu">百度</option>
                                    <option value="zhihu">知乎</option>
                                    <option value="toutiao">头条</option>
                                </select>
                                <button class="btn btn-sm" onclick="loadHotspots()">🔄 刷新</button>
                            </div>
                        </div>
                        <div id="hotspotList" class="hotspot-list">
                            <div class="empty-state">点击刷新加载热点</div>
                        </div>
                    </div>
                </section>

                <!-- 右侧：分类资讯 -->
                <section class="panel">
                    <!-- AI 资讯 -->
                    <div class="card">
                        <div class="card-header">
                            <h2>🤖 AI 资讯</h2>
                            <button class="btn btn-sm" onclick="loadNews('ai')">🔄 刷新</button>
                        </div>
                        <div id="news-ai" class="news-list">
                            <div class="empty-state">点击刷新加载</div>
                        </div>
                    </div>

                    <!-- 财经资讯 -->
                    <div class="card">
                        <div class="card-header">
                            <h2>💰 财经资讯</h2>
                            <button class="btn btn-sm" onclick="loadNews('finance')">🔄 刷新</button>
                        </div>
                        <div id="news-finance" class="news-list">
                            <div class="empty-state">点击刷新加载</div>
                        </div>
                    </div>

                    <!-- 科技资讯 -->
                    <div class="card">
                        <div class="card-header">
                            <h2>💻 科技资讯</h2>
                            <button class="btn btn-sm" onclick="loadNews('tech')">🔄 刷新</button>
                        </div>
                        <div id="news-tech" class="news-list">
                            <div class="empty-state">点击刷新加载</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- ==================== 页面2：内容创作 ==================== -->
        <main class="page" id="page-create">
            <div class="page-grid">
                <section class="panel">
                    <!-- 新建任务 -->
                    <div class="card">
                        <h2>✍️ 新建发布任务</h2>
                        <div class="form-group">
                            <label>文章主题</label>
                            <textarea id="topicInput" placeholder="输入你想写的内容主题，或从热点榜点击一个热点自动填入"></textarea>
                        </div>
                        <div class="form-group">
                            <label>目标平台</label>
                            <div class="platform-selector">
                                <label class="platform-tag" data-platform="xiaohongshu">
                                    <input type="checkbox" value="xiaohongshu" checked> 📕 小红书
                                </label>
                                <label class="platform-tag" data-platform="douyin">
                                    <input type="checkbox" value="douyin" checked> 🎵 抖音
                                </label>
                                <label class="platform-tag" data-platform="wechat">
                                    <input type="checkbox" value="wechat" checked> 💚 公众号
                                </label>
                                <label class="platform-tag" data-platform="kuaishou">
                                    <input type="checkbox" value="kuaishou"> 🔥 快手
                                </label>
                                <label class="platform-tag" data-platform="bilibili">
                                    <input type="checkbox" value="bilibili"> 📺 B站
                                </label>
                                <label class="platform-tag" data-platform="wechat_video">
                                    <input type="checkbox" value="wechat_video"> 📱 视频号
                                </label>
                            </div>
                        </div>

                        <!-- 高级选项 -->
                        <div class="advanced-section">
                            <button class="toggle-advanced" onclick="toggleAdvanced()">
                                ⚙️ 高级选项 <span id="advancedArrow">▼</span>
                            </button>
                            <div id="advancedPanel" class="advanced-panel hidden">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="featureAiArticle" checked> 🤖 AI 写文章
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="featureAiImage" checked> 🎨 AI 配图
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="featureAiFormatting" checked> 📐 自动排版
                                </label>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="startTask()">🚀 开始生成</button>
                            <label class="auto-toggle">
                                <input type="checkbox" id="autoPublish"> 跳过审核直接发布
                            </label>
                        </div>
                    </div>

                    <!-- 文章复刻 -->
                    <div class="card">
                        <h2>🔗 文章复刻</h2>
                        <p class="hint">粘贴文章链接，AI 自动分析风格并生成同类内容</p>
                        <div class="form-group" style="margin-top: 12px;">
                            <input type="text" id="cloneUrl" placeholder="粘贴小红书/公众号/抖音文章链接..." class="form-input">
                        </div>
                        <button class="btn btn-secondary" onclick="cloneArticle()">📋 抓取分析</button>
                        <div id="cloneResult" style="margin-top: 12px;"></div>
                    </div>
                </section>

                <!-- 右侧：日志 + 任务 -->
                <section class="panel">
                    <div class="card">
                        <h2>📋 执行日志</h2>
                        <div id="logArea" class="log-area">
                            <div class="log-item log-info">系统就绪，等待任务...</div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>📊 任务历史</h2>
                        <div id="taskList" class="task-list">
                            <div class="empty-state">暂无任务</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- ==================== 页面3：系统设置 ==================== -->
        <main class="page" id="page-settings">
            <div class="settings-grid">
                <!-- AI 大模型配置 -->
                <div class="card">
                    <h2>🤖 AI 大模型配置</h2>
                    <div class="form-group">
                        <label>AI 服务商</label>
                        <select id="aiProvider" class="form-input">
                            <option value="openai">OpenAI (GPT)</option>
                            <option value="claude">Anthropic (Claude)</option>
                            <option value="qwen">通义千问</option>
                            <option value="glm">智谱 (GLM)</option>
                            <option value="deepseek">DeepSeek</option>
                            <option value="custom">自定义</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="aiApiKey" class="form-input" placeholder="sk-...">
                    </div>
                    <div class="form-group">
                        <label>API Base URL</label>
                        <input type="text" id="aiBaseUrl" class="form-input" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <label>模型名称</label>
                        <input type="text" id="aiModel" class="form-input" placeholder="gpt-4o">
                    </div>
                    <div class="form-group">
                        <label>Temperature</label>
                        <input type="range" id="aiTemp" min="0" max="2" step="0.1" value="0.7">
                        <span id="aiTempVal">0.7</span>
                    </div>
                </div>

                <!-- 图片生成配置 -->
                <div class="card">
                    <h2>🎨 图片生成配置</h2>
                    <div class="form-group">
                        <label>图片生成服务</label>
                        <select id="imgProvider" class="form-input">
                            <option value="dall-e">DALL·E</option>
                            <option value="sd">Stable Diffusion</option>
                            <option value="flux">Flux</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="imgApiKey" class="form-input" placeholder="sk-...">
                    </div>
                    <div class="form-group">
                        <label>API Base URL</label>
                        <input type="text" id="imgBaseUrl" class="form-input" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <label>图片尺寸</label>
                        <select id="imgSize" class="form-input">
                            <option value="1024x1024">1024×1024 (正方形)</option>
                            <option value="1024x1792">1024×1792 (竖版)</option>
                            <option value="1792x1024">1792×1024 (横版)</option>
                        </select>
                    </div>
                    <div style="margin-top: 16px;">
                        <button class="btn btn-secondary" onclick="testConnection()">🔌 测试连接</button>
                    </div>
                </div>

                <!-- 平台管理 -->
                <div class="card">
                    <h2>📱 平台管理</h2>
                    <div id="platformSettings"></div>
                </div>

                <!-- 发布策略 -->
                <div class="card">
                    <h2>📋 发布策略</h2>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="reviewBefore"> 发布前人工审核
                        </label>
                    </div>
                    <div class="form-group">
                        <label>每日最大发布数</label>
                        <input type="number" id="maxDaily" class="form-input" min="1" max="50" value="3">
                    </div>
                    <div class="form-group">
                        <label>发布间隔（分钟）</label>
                        <input type="number" id="intervalMin" class="form-input" min="1" max="1440" value="60">
                    </div>
                    <div style="margin-top: 16px;">
                        <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 审核弹窗 -->
        <div id="reviewModal" class="modal hidden">
            <div class="modal-overlay" onclick="closeModal()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>👀 内容审核</h2>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>
                <div id="reviewBody" class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="approvePublish()">✅ 确认发布</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
